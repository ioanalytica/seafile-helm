{{- if and .Values.seafile.elasticsearch.enabled (eq .Values.seafile.elasticsearch.mode "internal") }}
{{- if not .Values.seafile.elasticsearch.internal.existingClaim }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "seafile.fullname" . }}-elasticsearch-data
  labels:
    {{- include "seafile.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.seafile.elasticsearch.internal.storageClassName }}
  storageClassName: {{ .Values.seafile.elasticsearch.internal.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.seafile.elasticsearch.internal.storageSize }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "seafile.fullname" . }}-elasticsearch
  labels:
    {{- include "seafile.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "seafile.name" . }}-elasticsearch
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      protocol: TCP
      port: 9200
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "seafile.fullname" . }}-elasticsearch
  labels:
    {{- include "seafile.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "seafile.name" . }}-elasticsearch
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "seafile.name" . }}-elasticsearch
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.seafile.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.seafile.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.seafile.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: set-vm-max-map-count
          image: busybox
          command: ['sysctl', '-w', 'vm.max_map_count=262144']
          securityContext:
            privileged: true
      containers:
        - name: elasticsearch
          image: {{ .Values.seafile.elasticsearch.internal.image }}
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: {{ .Values.seafile.elasticsearch.internal.javaOpts | quote }}
          ports:
            - name: http
              containerPort: 9200
              protocol: TCP
          volumeMounts:
            - name: elasticsearch-data
              mountPath: /usr/share/elasticsearch/data
          {{- with .Values.seafile.elasticsearch.internal.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: elasticsearch-data
          persistentVolumeClaim:
            claimName: {{ .Values.seafile.elasticsearch.internal.existingClaim | default (printf "%s-elasticsearch-data" (include "seafile.fullname" .)) }}
{{- end }}
