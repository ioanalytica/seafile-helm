{{- if .Values.seafile.cluster.enabled }}
{{- if and .Values.seafile.persistence.enabled (ne (include "seafile.cluster.initMode" .) "true") }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "seafile.fullname" . }}-configure
  labels:
    {{- include "seafile.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
    helm.sh/hook-weight: "0"
spec:
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "seafile.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: configure-job
    spec:
      restartPolicy: OnFailure
      {{- with .Values.seafile.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.seafile.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.seafile.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: configure
          image: busybox
          env:
            - name: DB_HOST
              value: {{ include "seafile.database.host" . | quote }}
            - name: DB_PORT
              value: {{ include "seafile.database.port" . | quote }}
            - name: DB_USER
              value: {{ .Values.seafile.database.user | quote }}
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "seafile.secretName" . }}
                  key: SEAFILE_MYSQL_DB_PASSWORD
            - name: CCNET_DB
              value: {{ .Values.seafile.database.ccnetDbName | quote }}
            - name: SEAFILE_DB
              value: {{ .Values.seafile.database.seafileDbName | quote }}
            - name: SEAHUB_DB
              value: {{ .Values.seafile.database.seahubDbName | quote }}
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "seafile.secretName" . }}
                  key: JWT_PRIVATE_KEY
            {{- if .Values.seafile.elasticsearch.enabled }}
            - name: ES_HOST
              value: {{ include "seafile.elasticsearch.host" . | quote }}
            - name: ES_PORT
              value: {{ include "seafile.elasticsearch.port" . | quote }}
            {{- if and (ne .Values.seafile.elasticsearch.mode "internal") .Values.seafile.elasticsearch.username }}
            - name: ES_USERNAME
              value: {{ .Values.seafile.elasticsearch.username | quote }}
            {{- end }}
            {{- if and (ne .Values.seafile.elasticsearch.mode "internal") .Values.seafile.elasticsearch.password }}
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "seafile.secretName" . }}
                  key: ES_PASSWORD
            {{- end }}
            {{- end }}
          command:
            - sh
            - -c
            - |
              CONF=/shared/seafile/conf
              mkdir -p "$CONF"

              # --- seahub_settings.py (always written from chart) ---
              cp /seahub-config/seahub_settings.py "$CONF/seahub_settings.py"
              {{- if and (eq .Values.seafile.edition "pro") .Values.seafile.seahub.ldap.enabled .Values.seafile.seahub.ldap.configMap }}
              echo "" >> "$CONF/seahub_settings.py"
              cat /ldap-config/{{ .Values.seafile.seahub.ldap.configMapKey }} >> "$CONF/seahub_settings.py"
              {{- end }}
              chmod 700 "$CONF/seahub_settings.py"

              # --- Patch existing config files (after initial setup) ---
              patch_ini() {
                _file="$1" _section="$2" _key="$3" _value="$4"
                awk -v section="$_section" -v key="$_key" -v val="$_value" '
                  /^\[/ { in_section = ($0 == "[" section "]") }
                  in_section && $0 ~ "^" key " *= " { print key " = " val; next }
                  { print }
                ' "$_file" > "$_file.tmp" && mv "$_file.tmp" "$_file"
              }

              ensure_ini() {
                _file="$1" _section="$2"; shift 2
                if ! grep -q "^\[$_section\]" "$_file"; then
                  printf '\n[%s]\n' "$_section" >> "$_file"
                  for _kv in "$@"; do
                    printf '%s\n' "$_kv" >> "$_file"
                  done
                  echo "Added missing [$_section] to $_file"
                fi
              }

              # --- ccnet.conf: generate from template if missing/empty, or patch ---
              if [ ! -s "$CONF/ccnet.conf" ]; then
                sed "s/__SEAFILE_MYSQL_DB_PASSWORD__/$DB_PASS/g" \
                  /ccnet-config/ccnet.conf > "$CONF/ccnet.conf"
                echo "Generated ccnet.conf from template"
              else
                ensure_ini "$CONF/ccnet.conf" "Database" \
                  "ENGINE = mysql" \
                  "HOST = $DB_HOST" \
                  "PORT = $DB_PORT" \
                  "USER = $DB_USER" \
                  "PASSWD = $DB_PASS" \
                  "DB = $CCNET_DB" \
                  "CONNECTION_CHARSET = utf8"
                patch_ini "$CONF/ccnet.conf" "Database" "HOST" "$DB_HOST"
                patch_ini "$CONF/ccnet.conf" "Database" "PORT" "$DB_PORT"
                patch_ini "$CONF/ccnet.conf" "Database" "USER" "$DB_USER"
                patch_ini "$CONF/ccnet.conf" "Database" "PASSWD" "$DB_PASS"
                patch_ini "$CONF/ccnet.conf" "Database" "DB" "$CCNET_DB"
                echo "Patched ccnet.conf"
              fi

              # --- seafile.conf: generate from template if missing/empty, or patch ---
              if [ ! -s "$CONF/seafile.conf" ]; then
                sed "s/__SEAFILE_MYSQL_DB_PASSWORD__/$DB_PASS/g;s/__JWT_PRIVATE_KEY__/$JWT_KEY/g" \
                  /seafile-conf-config/seafile.conf > "$CONF/seafile.conf"
                echo "Generated seafile.conf from template"
              else
                ensure_ini "$CONF/seafile.conf" "cluster" \
                  "enable = true"
                ensure_ini "$CONF/seafile.conf" "database" \
                  "type = mysql" \
                  "host = $DB_HOST" \
                  "port = $DB_PORT" \
                  "user = $DB_USER" \
                  "password = $DB_PASS" \
                  "db_name = $SEAFILE_DB" \
                  "connection_charset = utf8"
                ensure_ini "$CONF/seafile.conf" "notification" \
                  "enabled = {{ if .Values.seafile.notification.enabled }}true{{ else }}false{{ end }}" \
                  "host = 127.0.0.1" \
                  "port = 8083" \
                  "log_level = info" \
                  "jwt_private_key = $JWT_KEY"
                patch_ini "$CONF/seafile.conf" "database" "host" "$DB_HOST"
                patch_ini "$CONF/seafile.conf" "database" "port" "$DB_PORT"
                patch_ini "$CONF/seafile.conf" "database" "user" "$DB_USER"
                patch_ini "$CONF/seafile.conf" "database" "password" "$DB_PASS"
                patch_ini "$CONF/seafile.conf" "database" "db_name" "$SEAFILE_DB"
                patch_ini "$CONF/seafile.conf" "notification" "enabled" "{{ if .Values.seafile.notification.enabled }}true{{ else }}false{{ end }}"
                patch_ini "$CONF/seafile.conf" "notification" "host" "{{ include "seafile.notification.host" . }}"
                patch_ini "$CONF/seafile.conf" "notification" "jwt_private_key" "$JWT_KEY"
                echo "Patched seafile.conf"
              fi

              # --- seafevents.conf: generate from template if missing/empty, or patch ---
              if [ ! -s "$CONF/seafevents.conf" ]; then
                sed "s/__SEAFILE_MYSQL_DB_PASSWORD__/$DB_PASS/g;s/__ES_PASSWORD__/${ES_PASSWORD:-}/g" \
                  /seafevents-config/seafevents.conf > "$CONF/seafevents.conf"
                echo "Generated seafevents.conf from template"
              else
                ensure_ini "$CONF/seafevents.conf" "DATABASE" \
                  "type = mysql" \
                  "host = $DB_HOST" \
                  "port = $DB_PORT" \
                  "username = $DB_USER" \
                  "password = $DB_PASS" \
                  "name = $SEAHUB_DB"
                patch_ini "$CONF/seafevents.conf" "DATABASE" "host" "$DB_HOST"
                patch_ini "$CONF/seafevents.conf" "DATABASE" "port" "$DB_PORT"
                patch_ini "$CONF/seafevents.conf" "DATABASE" "username" "$DB_USER"
                patch_ini "$CONF/seafevents.conf" "DATABASE" "password" "$DB_PASS"
                patch_ini "$CONF/seafevents.conf" "DATABASE" "name" "$SEAHUB_DB"
                {{- if .Values.seafile.elasticsearch.enabled }}
                patch_ini "$CONF/seafevents.conf" "INDEX FILES" "es_host" "$ES_HOST"
                patch_ini "$CONF/seafevents.conf" "INDEX FILES" "es_port" "$ES_PORT"
                {{- if and (ne .Values.seafile.elasticsearch.mode "internal") .Values.seafile.elasticsearch.username }}
                patch_ini "$CONF/seafevents.conf" "INDEX FILES" "username" "$ES_USERNAME"
                {{- end }}
                {{- if and (ne .Values.seafile.elasticsearch.mode "internal") .Values.seafile.elasticsearch.password }}
                patch_ini "$CONF/seafevents.conf" "INDEX FILES" "password" "$ES_PASSWORD"
                {{- end }}
                {{- end }}
                echo "Patched seafevents.conf"
              fi
          volumeMounts:
            - name: seafile-data
              mountPath: /shared
            - name: seahub-config
              mountPath: /seahub-config
            - name: ccnet-config
              mountPath: /ccnet-config
            - name: seafile-conf-config
              mountPath: /seafile-conf-config
            - name: seafevents-config
              mountPath: /seafevents-config
            {{- if and (eq .Values.seafile.edition "pro") .Values.seafile.seahub.ldap.enabled .Values.seafile.seahub.ldap.configMap }}
            - name: ldap-config
              mountPath: /ldap-config
            {{- end }}
      volumes:
        - name: seafile-data
          persistentVolumeClaim:
            claimName: {{ .Values.seafile.persistence.existingClaim | default (printf "%s-data" (include "seafile.fullname" .)) }}
        - name: seahub-config
          configMap:
            name: {{ include "seafile.fullname" . }}-seahub
        - name: ccnet-config
          configMap:
            name: {{ include "seafile.fullname" . }}-ccnet
        - name: seafile-conf-config
          configMap:
            name: {{ include "seafile.fullname" . }}-seafile-conf
        - name: seafevents-config
          configMap:
            name: {{ include "seafile.fullname" . }}-seafevents
        {{- if and (eq .Values.seafile.edition "pro") .Values.seafile.seahub.ldap.enabled .Values.seafile.seahub.ldap.configMap }}
        - name: ldap-config
          configMap:
            name: {{ .Values.seafile.seahub.ldap.configMap }}
        {{- end }}
{{- end }}
{{- end }}
