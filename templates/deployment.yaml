apiVersion: apps/v1
kind: Deployment
metadata:
  {{- if .Values.seafile.cluster.enabled }}
  name: {{ include "seafile.fullname" . }}-backend
  {{- else }}
  name: {{ include "seafile.fullname" . }}
  {{- end }}
  labels:
    {{- include "seafile.labels" . | nindent 4 }}
    {{- if .Values.seafile.cluster.enabled }}
    app.kubernetes.io/component: backend
    {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- if .Values.seafile.cluster.enabled }}
      {{- include "seafile.backendSelectorLabels" . | nindent 6 }}
      {{- else }}
      {{- include "seafile.selectorLabels" . | nindent 6 }}
      {{- end }}
  template:
    metadata:
      labels:
        {{- if .Values.seafile.cluster.enabled }}
        {{- include "seafile.backendSelectorLabels" . | nindent 8 }}
        {{- else }}
        {{- include "seafile.selectorLabels" . | nindent 8 }}
        {{- end }}
      annotations:
        kubectl.kubernetes.io/default-container: "seafile"
    spec:
      enableServiceLinks: false
      {{- with .Values.seafile.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.seafile.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.seafile.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if .Values.seafile.persistence.enabled }}
        - name: configure
          image: busybox
          env:
            - name: DB_HOST
              value: {{ include "seafile.database.host" . | quote }}
            - name: DB_PORT
              value: {{ include "seafile.database.port" . | quote }}
            - name: DB_USER
              value: {{ .Values.seafile.database.user | quote }}
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "seafile.secretName" . }}
                  key: SEAFILE_MYSQL_DB_PASSWORD
            - name: CCNET_DB
              value: {{ .Values.seafile.database.ccnetDbName | quote }}
            - name: SEAFILE_DB
              value: {{ .Values.seafile.database.seafileDbName | quote }}
            - name: SEAHUB_DB
              value: {{ .Values.seafile.database.seahubDbName | quote }}
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "seafile.secretName" . }}
                  key: JWT_PRIVATE_KEY
          command:
            - sh
            - -c
            - |
              CONF=/shared/seafile/conf
              mkdir -p "$CONF"

              # --- seahub_settings.py (always written from chart) ---
              cp /seahub-config/seahub_settings.py "$CONF/seahub_settings.py"
              {{- if and (eq .Values.seafile.edition "pro") .Values.seafile.seahub.ldap.enabled .Values.seafile.seahub.ldap.configMap }}
              echo "" >> "$CONF/seahub_settings.py"
              cat /ldap-config/{{ .Values.seafile.seahub.ldap.configMapKey }} >> "$CONF/seahub_settings.py"
              {{- end }}
              chmod 700 "$CONF/seahub_settings.py"

              # --- Patch existing config files (after initial setup) ---
              # Only patch if files exist (created by Seafile's init process)
              # Uses section-aware awk to only replace keys within the target section

              # patch_ini FILE SECTION KEY VALUE
              # Replaces KEY = ... only within [SECTION], leaves other sections untouched
              patch_ini() {
                _file="$1" _section="$2" _key="$3" _value="$4"
                awk -v section="$_section" -v key="$_key" -v val="$_value" '
                  /^\[/ { in_section = ($0 == "[" section "]") }
                  in_section && $0 ~ "^" key " *= " { print key " = " val; next }
                  { print }
                ' "$_file" > "$_file.tmp" && mv "$_file.tmp" "$_file"
              }

              # ccnet.conf: [Database] section
              if [ -f "$CONF/ccnet.conf" ]; then
                patch_ini "$CONF/ccnet.conf" "Database" "HOST" "$DB_HOST"
                patch_ini "$CONF/ccnet.conf" "Database" "PORT" "$DB_PORT"
                patch_ini "$CONF/ccnet.conf" "Database" "USER" "$DB_USER"
                patch_ini "$CONF/ccnet.conf" "Database" "PASSWD" "$DB_PASS"
                patch_ini "$CONF/ccnet.conf" "Database" "DB" "$CCNET_DB"
                echo "Patched ccnet.conf"
              fi

              # seafile.conf: [database] section + [notification] jwt_private_key
              if [ -f "$CONF/seafile.conf" ]; then
                patch_ini "$CONF/seafile.conf" "database" "host" "$DB_HOST"
                patch_ini "$CONF/seafile.conf" "database" "port" "$DB_PORT"
                patch_ini "$CONF/seafile.conf" "database" "user" "$DB_USER"
                patch_ini "$CONF/seafile.conf" "database" "password" "$DB_PASS"
                patch_ini "$CONF/seafile.conf" "database" "db_name" "$SEAFILE_DB"
                patch_ini "$CONF/seafile.conf" "notification" "jwt_private_key" "$JWT_KEY"
                echo "Patched seafile.conf"
              fi

              # seafevents.conf: [DATABASE] section
              if [ -f "$CONF/seafevents.conf" ]; then
                patch_ini "$CONF/seafevents.conf" "DATABASE" "host" "$DB_HOST"
                patch_ini "$CONF/seafevents.conf" "DATABASE" "port" "$DB_PORT"
                patch_ini "$CONF/seafevents.conf" "DATABASE" "username" "$DB_USER"
                patch_ini "$CONF/seafevents.conf" "DATABASE" "password" "$DB_PASS"
                patch_ini "$CONF/seafevents.conf" "DATABASE" "name" "$SEAHUB_DB"
                echo "Patched seafevents.conf"
              fi
          volumeMounts:
            - name: seafile-data
              mountPath: /shared
            - name: seahub-config
              mountPath: /seahub-config
            {{- if and (eq .Values.seafile.edition "pro") .Values.seafile.seahub.ldap.enabled .Values.seafile.seahub.ldap.configMap }}
            - name: ldap-config
              mountPath: /ldap-config
            {{- end }}
        {{- end }}
        {{- if and .Values.seafile.initMode .Values.seafile.persistence.enabled }}
        - name: set-ownership
          image: busybox
          command: ['sh', '-c', 'chown -R root:root /shared']
          volumeMounts:
            - name: seafile-data
              mountPath: /shared
        {{- end }}
      containers:
        - name: seafile
          image: {{ include "seafile.image" . }}
          envFrom:
            - configMapRef:
                name: {{ include "seafile.fullname" . }}-env
            - secretRef:
                name: {{ include "seafile.secretName" . }}
          {{- with .Values.seafile.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: SEAFILE_AI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "seafile.secretName" . }}
                  key: JWT_PRIVATE_KEY
            {{- if .Values.seafile.cluster.enabled }}
            - name: CLUSTER_INIT_MODE
              value: {{ .Values.seafile.initMode | quote }}
            - name: CLUSTER_SERVER
              value: "true"
            - name: CLUSTER_MODE
              value: "backend"
            {{- end }}
            {{- if and (ne .Values.seafile.cache.mode "internal") (eq .Values.seafile.cache.provider "redis") .Values.seafile.cache.redis.existingSecret }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.seafile.cache.redis.existingSecret }}
                  key: {{ .Values.seafile.cache.redis.existingSecretKey }}
            {{- end }}
            {{- if and (ne .Values.seafile.cache.mode "internal") (eq .Values.seafile.cache.provider "memcached") .Values.seafile.cache.memcached.existingSecret }}
            - name: MEMCACHED_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.seafile.cache.memcached.existingSecret }}
                  key: {{ .Values.seafile.cache.memcached.existingSecretKey }}
            {{- end }}
            {{- if and (eq .Values.seafile.edition "pro") .Values.seafile.seahub.ldap.enabled }}
            - name: LDAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "seafile.secretName" . }}
                  key: LDAP_ADMIN_PASSWORD
            {{- end }}
          {{- if not .Values.seafile.cluster.enabled }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          {{- end }}
          volumeMounts:
            {{- if .Values.seafile.persistence.enabled }}
            - name: seafile-data
              mountPath: /shared
            {{- end }}
            {{- if and (ne .Values.seafile.edition "ce") .Values.seafile.license.existingSecret }}
            - name: seafile-license
              mountPath: /opt/seafile/seafile-license.txt
              subPath: {{ .Values.seafile.license.secretKey }}
              readOnly: true
            {{- end }}
            {{- if .Values.seafile.logging.ephemeral }}
            - name: seafile-logs
              mountPath: /shared/seafile/logs
            {{- end }}
            {{- with .Values.seafile.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.seafile.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: seahub-config
          configMap:
            name: {{ include "seafile.fullname" . }}-seahub
        {{- if and (eq .Values.seafile.edition "pro") .Values.seafile.seahub.ldap.enabled .Values.seafile.seahub.ldap.configMap }}
        - name: ldap-config
          configMap:
            name: {{ .Values.seafile.seahub.ldap.configMap }}
        {{- end }}
        {{- if and (ne .Values.seafile.edition "ce") .Values.seafile.license.existingSecret }}
        - name: seafile-license
          secret:
            secretName: {{ .Values.seafile.license.existingSecret }}
        {{- end }}
        {{- if .Values.seafile.persistence.enabled }}
        - name: seafile-data
          persistentVolumeClaim:
            claimName: {{ .Values.seafile.persistence.existingClaim | default (printf "%s-data" (include "seafile.fullname" .)) }}
        {{- end }}
        {{- if .Values.seafile.logging.ephemeral }}
        - name: seafile-logs
          emptyDir: {}
        {{- end }}
        {{- with .Values.seafile.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      restartPolicy: Always
