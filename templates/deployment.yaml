apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "seafile.fullname" . }}
  labels:
    {{- include "seafile.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "seafile.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "seafile.selectorLabels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: "seafile"
    spec:
      enableServiceLinks: false
      {{- with .Values.seafile.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.seafile.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.seafile.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- if .Values.seafile.persistence.enabled }}
        - name: copy-seahub-config
          image: busybox
          command:
            - sh
            - -c
            - |
              mkdir -p /shared/seafile/conf
              cp /seahub-config/seahub_settings.py /shared/seafile/conf/seahub_settings.py
              {{- if and (eq .Values.seafile.edition "pro") .Values.seafile.seahub.ldap.enabled .Values.seafile.seahub.ldap.configMap }}
              echo "" >> /shared/seafile/conf/seahub_settings.py
              cat /ldap-config/{{ .Values.seafile.seahub.ldap.configMapKey }} >> /shared/seafile/conf/seahub_settings.py
              {{- end }}
              chmod 700 /shared/seafile/conf/seahub_settings.py
          volumeMounts:
            - name: seafile-data
              mountPath: /shared
            - name: seahub-config
              mountPath: /seahub-config
            {{- if and (eq .Values.seafile.edition "pro") .Values.seafile.seahub.ldap.enabled .Values.seafile.seahub.ldap.configMap }}
            - name: ldap-config
              mountPath: /ldap-config
            {{- end }}
        {{- end }}
        {{- if and .Values.seafile.initMode .Values.seafile.persistence.enabled }}
        - name: set-ownership
          image: busybox
          command: ['sh', '-c', 'chown -R root:root /shared']
          volumeMounts:
            - name: seafile-data
              mountPath: /shared
        {{- end }}
      containers:
        - name: seafile
          image: {{ include "seafile.image" . }}
          envFrom:
            - configMapRef:
                name: {{ include "seafile.fullname" . }}-env
            - secretRef:
                name: {{ include "seafile.secretName" . }}
          {{- with .Values.seafile.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: SEAFILE_AI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "seafile.secretName" . }}
                  key: JWT_PRIVATE_KEY
            {{- if and (eq .Values.seafile.cache.provider "redis") .Values.seafile.cache.redis.existingSecret }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.seafile.cache.redis.existingSecret }}
                  key: {{ .Values.seafile.cache.redis.existingSecretKey }}
            {{- end }}
            {{- if and (eq .Values.seafile.cache.provider "memcached") .Values.seafile.cache.memcached.existingSecret }}
            - name: MEMCACHED_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.seafile.cache.memcached.existingSecret }}
                  key: {{ .Values.seafile.cache.memcached.existingSecretKey }}
            {{- end }}
            {{- if and (eq .Values.seafile.edition "pro") .Values.seafile.seahub.ldap.enabled }}
            - name: LDAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "seafile.secretName" . }}
                  key: LDAP_ADMIN_PASSWORD
            {{- end }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            {{- if .Values.seafile.persistence.enabled }}
            - name: seafile-data
              mountPath: /shared
            {{- end }}
            {{- if and (ne .Values.seafile.edition "ce") .Values.seafile.license.existingSecret }}
            - name: seafile-license
              mountPath: /opt/seafile/seafile-license.txt
              subPath: {{ .Values.seafile.license.secretKey }}
              readOnly: true
            {{- end }}
            {{- if .Values.seafile.logging.ephemeral }}
            - name: seafile-logs
              mountPath: /shared/seafile/logs
            {{- end }}
            {{- with .Values.seafile.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.seafile.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: seahub-config
          configMap:
            name: {{ include "seafile.fullname" . }}-seahub
        {{- if and (eq .Values.seafile.edition "pro") .Values.seafile.seahub.ldap.enabled .Values.seafile.seahub.ldap.configMap }}
        - name: ldap-config
          configMap:
            name: {{ .Values.seafile.seahub.ldap.configMap }}
        {{- end }}
        {{- if and (ne .Values.seafile.edition "ce") .Values.seafile.license.existingSecret }}
        - name: seafile-license
          secret:
            secretName: {{ .Values.seafile.license.existingSecret }}
        {{- end }}
        {{- if .Values.seafile.persistence.enabled }}
        - name: seafile-data
          persistentVolumeClaim:
            claimName: {{ .Values.seafile.persistence.existingClaim | default (printf "%s-data" (include "seafile.fullname" .)) }}
        {{- end }}
        {{- if .Values.seafile.logging.ephemeral }}
        - name: seafile-logs
          emptyDir: {}
        {{- end }}
        {{- with .Values.seafile.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      restartPolicy: Always
