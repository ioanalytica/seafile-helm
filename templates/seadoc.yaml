{{- if and .Values.seafile.seadoc.enabled (eq .Values.seafile.seadoc.mode "internal") }}
{{- if not .Values.seafile.seadoc.internal.existingClaim }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "seafile.fullname" . }}-seadoc-data
  labels:
    {{- include "seafile.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.seafile.seadoc.internal.storageClassName }}
  storageClassName: {{ .Values.seafile.seadoc.internal.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.seafile.seadoc.internal.storageSize }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "seafile.fullname" . }}-seadoc
  labels:
    {{- include "seafile.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "seafile.name" . }}-seadoc
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "seafile.fullname" . }}-seadoc
  labels:
    {{- include "seafile.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "seafile.name" . }}-seadoc
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "seafile.name" . }}-seadoc
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.seafile.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.seafile.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.seafile.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: seadoc
          image: {{ .Values.seafile.seadoc.internal.image }}
          # SeaDoc shares the Seafile configmap and secret: it reads the same
          # SEAFILE_MYSQL_DB_*, SEAFILE_SERVER_HOSTNAME, SEAFILE_SERVER_PROTOCOL,
          # TIME_ZONE, and JWT_PRIVATE_KEY that the main container uses.
          envFrom:
            - configMapRef:
                name: {{ include "seafile.fullname" . }}-env
            - secretRef:
                name: {{ include "seafile.secretName" . }}
          env:
            # Override SEADOC_SERVER_URL to point to itself (the auto-derived URL)
            - name: SEADOC_SERVER_URL
              value: {{ include "seafile.seadoc.url" . | quote }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: seadoc-data
              mountPath: /shared
          {{- with .Values.seafile.seadoc.internal.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: seadoc-data
          persistentVolumeClaim:
            claimName: {{ .Values.seafile.seadoc.internal.existingClaim | default (printf "%s-seadoc-data" (include "seafile.fullname" .)) }}
{{- end }}
