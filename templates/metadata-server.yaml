{{- if and .Values.seafile.metadata.enabled (eq .Values.seafile.metadata.mode "internal") }}
{{- if not .Values.seafile.metadata.internal.existingClaim }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "seafile.fullname" . }}-metadata-data
  labels:
    {{- include "seafile.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.seafile.metadata.internal.storageClassName }}
  storageClassName: {{ .Values.seafile.metadata.internal.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.seafile.metadata.internal.storageSize }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "seafile.fullname" . }}-metadata
  labels:
    {{- include "seafile.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "seafile.name" . }}-metadata
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      protocol: TCP
      port: 8084
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "seafile.fullname" . }}-metadata
  labels:
    {{- include "seafile.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "seafile.name" . }}-metadata
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "seafile.name" . }}-metadata
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.seafile.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.seafile.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.seafile.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: metadata
          image: {{ .Values.seafile.metadata.internal.image }}
          # Inherits SEAFILE_MYSQL_DB_*, SEAFILE_LOG_TO_STDOUT, CACHE_PROVIDER,
          # REDIS_HOST/PORT, S3_*, SEAF_SERVER_STORAGE_TYPE (pro), JWT_PRIVATE_KEY,
          # SEAFILE_MYSQL_DB_PASSWORD, REDIS_PASSWORD, S3_SECRET_KEY, S3_SSE_C_KEY
          # from the shared configmap and secret.
          envFrom:
            - configMapRef:
                name: {{ include "seafile.fullname" . }}-env
            - secretRef:
                name: {{ include "seafile.secretName" . }}
          env:
            {{- if and (ne .Values.seafile.cache.mode "internal") .Values.seafile.cache.redis.existingSecret }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.seafile.cache.redis.existingSecret }}
                  key: {{ .Values.seafile.cache.redis.existingSecretKey }}
            {{- end }}
            {{- if and (ne .Values.seafile.cache.mode "internal") .Values.seafile.cache.memcached.existingSecret }}
            - name: MEMCACHED_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.seafile.cache.memcached.existingSecret }}
                  key: {{ .Values.seafile.cache.memcached.existingSecretKey }}
            {{- end }}
            {{/* SEAF_SERVER_STORAGE_TYPE is only in the main configmap for pro edition;
                 set it explicitly here so CE deployments also pass it correctly. */}}
            - name: SEAF_SERVER_STORAGE_TYPE
              value: {{ .Values.seafile.storage.type | quote }}
            {{- if .Values.seafile.metadata.storageType }}
            - name: MD_STORAGE_TYPE
              value: {{ .Values.seafile.metadata.storageType | quote }}
            {{- end }}
            {{- $mdStorageType := .Values.seafile.metadata.storageType | default .Values.seafile.storage.type }}
            {{- if and (eq $mdStorageType "s3") .Values.seafile.metadata.s3.bucket }}
            - name: S3_MD_BUCKET
              value: {{ .Values.seafile.metadata.s3.bucket | quote }}
            {{- end }}
            - name: MD_MAX_CACHE_SIZE
              value: {{ .Values.seafile.metadata.maxCacheSize | quote }}
            - name: MD_FILE_COUNT_LIMIT
              value: {{ .Values.seafile.metadata.fileCountLimit | quote }}
            - name: MD_CHECK_UPDATE_INTERVAL
              value: {{ .Values.seafile.metadata.checkUpdateInterval | quote }}
          ports:
            - name: http
              containerPort: 8084
              protocol: TCP
          volumeMounts:
            - name: metadata-data
              mountPath: /opt/seafile-data
          {{- with .Values.seafile.metadata.internal.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: metadata-data
          persistentVolumeClaim:
            claimName: {{ .Values.seafile.metadata.internal.existingClaim | default (printf "%s-metadata-data" (include "seafile.fullname" .)) }}
{{- end }}
