seafile:
  # Edition: "ce" (Community) or "pro" (Professional)
  edition: "ce"

  # Initialization mode - set to true for first deployment
  initMode: true

  # Container image
  # repository defaults to seafileltd/seafile-mc (CE) or seafileltd/seafile-pro-mc (Pro)
  image:
    repository: ""
    # tag defaults to appVersion from Chart.yaml
    tag: ""

  # Service configuration
  service:
    type: ClusterIP
    # loadBalancerIP: ""

  # Ingress configuration
  ingress:
    enabled: false
    ingressClassName: ""
    annotations: {}
    hosts:
      - host: seafile.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
    #  - secretName: seafile-tls
    #    hosts:
    #      - seafile.example.com

  # Persistent storage
  persistence:
    enabled: true
    storageClassName: ""
    accessMode: ReadWriteOnce
    size: 10Gi
    existingClaim: ""

  # Use a pre-created secret instead of chart-managed one.
  # For production, this is strongly recommended over setting passwords
  # in values.yaml, which end up in plain text in Helm release metadata.
  # Create the secret manually or via an external secrets operator and
  # reference it here.
  #
  # Expected keys:
  #   JWT_PRIVATE_KEY               - always required
  #   SEAFILE_MYSQL_DB_PASSWORD     - always required
  #   INIT_SEAFILE_ADMIN_PASSWORD   - required when initMode is true
  #   INIT_SEAFILE_MYSQL_ROOT_PASSWORD - required when initMode is true
  #   REDIS_PASSWORD                - when cache.provider is redis
  #                                   (unless cache.redis.existingSecret is set)
  #   MEMCACHED_PASSWORD            - when cache.provider is memcached
  #                                   (unless cache.memcached.existingSecret is set)
  #   S3_SECRET_KEY                 - when edition is pro and storage.type is s3
  #   S3_SSE_C_KEY                  - when edition is pro and storage.type is s3
  #   LDAP_ADMIN_PASSWORD           - when edition is pro and seahub.ldap.enabled is true
  existingSecret: ""

  # Image pull secrets
  imagePullSecrets: []
  #  - name: regcred

  # Pod scheduling
  nodeSelector: {}
  tolerations: []

  # Resources
  resources: {}

  # Extra env sources (configMapRef/secretRef)
  extraEnv: []

  # Extra volumes and mounts
  extraVolumes: []
  #  - name: custom-config
  #    configMap:
  #      name: my-seafile-config
  #  - name: extra-storage
  #    persistentVolumeClaim:
  #      claimName: extra-data-pvc
  #  - name: tmp
  #    emptyDir: {}
  extraVolumeMounts: []
  #  - name: custom-config
  #    mountPath: /etc/seafile/custom
  #    readOnly: true
  #  - name: extra-storage
  #    mountPath: /extra-data
  #  - name: tmp
  #    mountPath: /tmp

  # ---------------------------------------------------------------------------
  # Seafile Configuration
  # ---------------------------------------------------------------------------

  # Server
  server:
    hostname: ""              # required - e.g. seafile.example.com
    protocol: "https"
    siteRoot: "/"
    timezone: "UTC"
    logToStdout: true

  # Logging - mount emptyDir over /shared/seafile/logs to prevent
  # log accumulation on the PVC. Logs are ephemeral and can be
  # collected by Promtail/Loki or similar.
  logging:
    ephemeral: true

  # Admin
  # For production, set passwords via existingSecret instead of here.
  admin:
    email: ""                 # required when initMode is true
    password: ""              # secret - use existingSecret for production

  # Database
  # mode: "internal" deploys a MariaDB instance within the chart.
  # mode: "external" requires host to be set.
  # For production, set passwords via existingSecret instead of here.
  database:
    mode: "external"          # "internal" or "external"
    host: ""                  # required when mode is external
    port: 3306
    user: "seafile"
    password: ""              # secret - use existingSecret for production
    rootPassword: ""          # secret - used during init and internal mode
    ccnetDbName: "ccnet_db"
    seafileDbName: "seafile_db"
    seahubDbName: "seahub_db"
    internal:
      image: "mariadb:10.11"
      storageSize: "10Gi"
      storageClassName: ""
      resources: {}

  # Cache
  # mode: "internal" deploys a Redis instance within the chart.
  # mode: "external" requires the provider's host to be set.
  # For production, use existingSecret per provider instead of password here.
  cache:
    mode: "external"          # "internal" or "external"
    provider: "redis"         # "redis" or "memcached"
    redis:
      host: ""                # required when mode is external and provider is redis
      port: 6379
      password: ""            # use existingSecret for production
      existingSecret: ""      # e.g. redis-credentials
      existingSecretKey: "redis-password"  # key within the existing secret
    memcached:
      host: ""                # required when mode is external and provider is memcached
      port: 11211
      password: ""            # use existingSecret for production
      existingSecret: ""
      existingSecretKey: "memcached-password"
    internal:
      image: "redis:7-alpine"
      storageSize: "1Gi"
      storageClassName: ""
      resources: {}

  # Object storage (pro edition only)
  storage:
    type: "disk"              # "disk" or "s3"
    s3:
      commitBucket: ""
      fsBucket: ""
      blockBucket: ""
      keyId: ""
      secretKey: ""           # secret - use existingSecret for production
      sseCKey: ""             # secret - use existingSecret for production
      useV4Signature: true
      region: "us-east-1"
      host: ""                # for S3-compatible services
      useHttps: true
      pathStyleRequest: false

  # JWT
  jwt:
    privateKey: ""            # secret - use existingSecret for production

  # Notification server
  notification:
    enabled: false
    url: ""                   # required when enabled

  # SeaDoc
  seadoc:
    enabled: false
    url: ""                   # required when enabled

  # Seafile AI
  ai:
    enabled: false
    url: ""                   # required when enabled

  # Metadata
  metadata:
    fileCountLimit: 100000

  # License (pro edition only)
  # Mount a Seafile license file from an existing Secret.
  # The secret should contain the license file content under the given key.
  # Example: kubectl create secret generic seafile-license --from-file=seafile-license.txt
  license:
    existingSecret: ""        # e.g. seafile-license
    secretKey: "seafile-license.txt"

  # Seahub settings (written directly to seahub_settings.py)
  # This gives the chart full control over seahub configuration,
  # independent of Seafile Docker's env-var-based init.
  seahub:
    debug: false

    # LDAP (pro edition only)
    # The LDAP admin password should be provided via:
    #   - existingSecret with key LDAP_ADMIN_PASSWORD, or
    #   - seahub.ldap.adminPassword (not recommended for production)
    # All other LDAP settings go in an external ConfigMap containing
    # raw Python assignments (one per line). Example ConfigMap data:
    #   ldap_settings.py: |
    #     ENABLE_LDAP = True
    #     LDAP_SERVER_URL = 'ldaps://ldap.example.com:636/'
    #     LDAP_BASE_DN = 'dc=example,dc=com'
    #     LDAP_ADMIN_DN = 'cn=admin,dc=example,dc=com'
    #     LDAP_LOGIN_ATTR = 'uid'
    #     LDAP_FILTER = 'memberOf=cn=seafile,ou=groups,dc=example,dc=com'
    #     ENABLE_LDAP_USER_SYNC = True
    #     LDAP_SYNC_INTERVAL = 60
    ldap:
      enabled: false
      configMap: ""           # name of existing ConfigMap with LDAP settings
      configMapKey: "ldap_settings.py"  # key within the ConfigMap
      adminPassword: ""       # secret - use existingSecret for production

    # Additional raw Python to append to seahub_settings.py
    # Example:
    #   rawConfig: |
    #     ENABLE_SIGNUP = False
    #     LOGIN_REMEMBER_DAYS = 7
    rawConfig: ""

  # Elasticsearch - for full-text file search indexing
  # Required for cluster mode, optional otherwise.
  # mode: "internal" deploys a single-node ES instance within the chart.
  # mode: "external" requires host to be set.
  # Set to disabled (default) when not needed.
  elasticsearch:
    enabled: false
    mode: "external"        # "internal" or "external"
    host: ""                # required when mode is external
    port: 9200
    # External ES with authentication: credentials are passed as env vars
    # and must be configured in seafevents.conf [INDEX FILES] section.
    # Use seahub.rawConfig or patch seafevents.conf accordingly.
    username: ""            # optional
    password: ""            # optional - use existingSecret for production
    internal:
      image: "elasticsearch:8.15.0"
      javaOpts: "-Xms512m -Xmx512m"
      storageSize: "5Gi"
      storageClassName: ""
      resources:
        requests:
          memory: 1Gi
          cpu: 500m

  # ---------------------------------------------------------------------------
  # Cluster Mode
  # ---------------------------------------------------------------------------
  # Splits the deployment into frontend (web UI, scalable) and backend
  # (background tasks: mail, maintenance, indexing — single instance).
  # The backend being single-instance is by design — it handles non-request
  # tasks that do not affect availability.
  # Requires elasticsearch.enabled and a ReadWriteMany PVC.
  cluster:
    enabled: false
    frontend:
      replicas: 2           # number of frontend replicas (0 during init)
