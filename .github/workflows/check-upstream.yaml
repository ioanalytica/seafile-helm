name: Check Upstream Seafile Release

on:
  schedule:
    - cron: "23 7 * * *"   # daily at 07:23 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Check for new Seafile release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Current appVersion from Chart.yaml
          CURRENT=$(grep '^appVersion:' Chart.yaml | sed 's/appVersion: *"\?\([^"]*\)"\?/\1/')
          echo "Current appVersion: $CURRENT"

          # Extract major.minor from current version (e.g. 13.0 from 13.0.19)
          MAJOR_MINOR=$(echo "$CURRENT" | grep -oP '^\d+\.\d+')
          echo "Tracking series: $MAJOR_MINOR"

          # Fetch latest stable tags from Docker Hub for both editions
          # Note: CE image is "seafile-mc" on Docker Hub (not "seafile-ce-mc")
          for IMAGE in seafile-pro-mc seafile-mc; do
            echo "Checking seafileltd/${IMAGE}..."
            LATEST=$(curl -s "https://hub.docker.com/v2/repositories/seafileltd/${IMAGE}/tags/?page_size=100&ordering=last_updated" \
              | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          # Filter: same major.minor, no suffix like -testing/-arm-testing/-latest
          import re
          pattern = re.compile(r'^${MAJOR_MINOR}\.\d+$')
          versions = [r['name'] for r in data['results'] if pattern.match(r['name'])]
          versions.sort(key=lambda v: list(map(int, v.split('.'))), reverse=True)
          print(versions[0] if versions else '')
          ")

            echo "Latest stable ${IMAGE}: ${LATEST:-none}"

            if [ -n "$LATEST" ] && [ "$LATEST" != "$CURRENT" ]; then
              # Check version is actually newer
              NEWER=$(python3 -c "
          current = list(map(int, '${CURRENT}'.split('.')))
          latest = list(map(int, '${LATEST}'.split('.')))
          print('yes' if latest > current else 'no')
          ")
              if [ "$NEWER" = "yes" ]; then
                TITLE="Upstream Seafile ${LATEST} released (${IMAGE})"

                # Don't create duplicate issues
                EXISTING=$(gh issue list --search "\"${TITLE}\" in:title" --state open --json number --jq length)
                if [ "$EXISTING" = "0" ]; then
                  gh issue create \
                    --title "$TITLE" \
                    --label "upstream-release" \
                    --body "$(cat <<EOF
          A new Seafile version has been detected on Docker Hub.

          | | Version |
          |---|---|
          | **Current chart appVersion** | \`${CURRENT}\` |
          | **New upstream release** | \`${LATEST}\` |
          | **Image** | \`seafileltd/${IMAGE}:${LATEST}\` |

          ### Steps
          1. Update \`appVersion\` in \`Chart.yaml\` to \`${LATEST}\`
          2. Bump chart \`version\` (e.g. \`${LATEST}-1\`)
          3. Test, tag, and release
          EOF
          )"
                  echo "Created issue: ${TITLE}"
                else
                  echo "Issue already exists: ${TITLE}"
                fi
              fi
            fi
          done
