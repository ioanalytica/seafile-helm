apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: seafile-dev
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/ioanalytica/seafile-helm
  ref:
    branch: develop
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seafile
  namespace: seafile
spec:
  interval: 1m
  chart:
    spec:
      chart: .
      sourceRef:
        kind: GitRepository
        name: seafile-dev
        namespace: flux-system
  values:
    seafile:
      edition: "ce"
      initMode: true

      image:
        repository: seafileltd/seafile-ce-mc

      existingSecret: "seafile-secret"

      server:
        hostname: "seafile.dev.example.com"
        protocol: "https"

      admin:
        email: "admin@example.com"

      database:
        host: "mariadb.seafile.svc.cluster.local"

      cache:
        provider: "redis"
        redis:
          host: "redis-master.seafile.svc.cluster.local"
          existingSecret: "redis-credentials"
          existingSecretKey: "redis-password"

      persistence:
        enabled: true
        storageClassName: "local-path"
        size: 50Gi

      logging:
        ephemeral: true
